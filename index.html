<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
        }
          
         
         
         
         
         
        
        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .header {
            padding: 24px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            background: rgba(15, 23, 42, 0.98);
        }
        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .header p {
            color: #cbd5e1;
            font-size: 0.95rem;
        }
        .status {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 14px;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 999px;
            color: #e0e7ff;
            font-size: 0.85rem;
        }
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            justify-content: flex-end;
        }
        .message.bot {
            justify-content: flex-start;
        }
        .message-content {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.6;
            word-wrap: break-word;
        }
        .user .message-content {
            background: linear-gradient(135deg, #6366f1, #818cf8);
            color: white;
        }
        .bot .message-content {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.25);
            color: #dcfce7;
        }
        .loading {
            color: #94a3b8;
            font-style: italic;
        }
        .input-area {
            padding: 20px;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
            background: rgba(15, 23, 42, 0.98);
            display: flex;
            gap: 12px;
        }
        textarea {
            flex: 1;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 16px;
            padding: 14px;
            color: #e2e8f0;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 50px;
            max-height: 120px;
        }
        textarea:focus {
            outline: none;
            border-color: rgba(99, 102, 241, 0.5);
        }
        button {
            background: linear-gradient(135deg, #6366f1, #818cf8);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 14px 24px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.15s, box-shadow 0.15s;
            align-self: flex-end;
            height: fit-content;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }
        button:active {
            transform: translateY(0);
        }
        .error {
            color: #fecaca;
            padding: 12px 16px;
            background: rgba(248, 113, 113, 0.15);
            border-radius: 12px;
            margin: 12px 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI Assistant</h1>
            <p>Savolingizni yozing, Enter bosing yoki Yuborish tugmasini bosing</p>
            <div class="status">Status: <span id="statusText">Backend ulanmoqda...</span></div>
        </div>

        <div class="chat-box" id="chatBox"></div>

        <div id="error" class="error" style="display: none;"></div>

        <div class="input-area">
            <textarea id="input" placeholder="Savolingizni bu yerga yozing..."></textarea>
            <button onclick="sendMessage()">Yuborish</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('input');
        const chatBox = document.getElementById('chatBox');
        const statusText = document.getElementById('statusText');
        const errorDiv = document.getElementById('error');
        let chatHistory = [];
        let isSending = false;

        // Tekshirish
        fetch('/api/status')
            .then(r => r.json())
            .then(d => {
                statusText.textContent = `Model: ${d.model} · Qurilma: ${d.device}`;
            })
            .catch(() => {
                statusText.textContent = 'Backend ulanmadi - serverni ishga tushiring!';
            });

        async function sendMessage() {
            const text = input.value.trim();
            if (!text || isSending) return;

            isSending = true;
            input.value = '';
            errorDiv.style.display = 'none';

            // Foydalanuvchi savoli
            addMessage(text, 'user');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: text,
                        history: chatHistory.map(([q, a]) => [q, a])
                    })
                });

                if (!response.ok) throw new Error('Server xatosi');
                const data = await response.json();

                chatHistory = data.history.map(([q, a]) => [q, a]);
                addMessage(data.answer, 'bot');
            } catch (err) {
                showError(err.message);
            } finally {
                isSending = false;
                input.focus();
            }
        }

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;
            div.appendChild(content);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
        }

        // Enter tugmasi
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
